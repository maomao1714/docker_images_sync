name: Sync Docker Images to Private Registries

on:
  push:
    paths:
      - 'images.txt'
      - 'sync.sh'
      - '.github/workflows/sync-images.yml'
  schedule:
    - cron: '0 22 * * *'   # 每天 UTC 2:00 运行
  workflow_dispatch:       # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PWD }}

      - name: Run sync script
        run: |
          chmod +x "${{ github.workspace }}/sync.sh"
          bash "${{ github.workspace }}/sync.sh" \
            "${{ github.workspace }}/images.txt" \
            "${{ secrets.DOCKER_REGISTRY }}" \
            "${{ secrets.DOCKER_NS }}"

      - name: Summary
        if: always()
        run: echo "Sync job finished with status ${{ job.status }}"
